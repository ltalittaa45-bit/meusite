<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Presente</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

button{
padding:12px 25px;
font-size:16px;
background:#ff4d6d;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

input{
padding:10px;
font-size:16px;
}

.tela{
display:none;
padding:40px;
}

.coracao{
position:fixed;
top:-10px;
animation:cair 6s linear infinite;
}

@keyframes cair{
0%{transform:translateY(-10px)}
100%{transform:translateY(110vh)}
}

.caixa{
width:150px;
height:150px;
margin:auto;
cursor:pointer;
position:relative;
}

.tampa{
width:150px;
height:40px;
background:red;
position:absolute;
top:0;
transition:1s;
}

.base{
width:150px;
height:110px;
background:#ff8080;
position:absolute;
bottom:0;
}

.aberta .tampa{
transform:rotate(-40deg) translateY(-60px);
}

</style>

</head>

<body>

<audio id="musica" controls>
<source src="pride.mp3" type="audio/mpeg">
</audio>

<div id="inicio" class="tela" style="display:block">

<h1>🎁 Existe um presente para você</h1>
<p>Mas só será liberado se acertar o quiz</p>

<button onclick="iniciar()">Começar</button>

</div>

<div id="quiz" class="tela">

<h2 id="pergunta"></h2>

<input id="resposta">

<br><br>

<button onclick="verificar()">Responder</button>

<p id="tentativas"></p>

</div>

<div id="presente" class="tela">

<h1>🎉 Parabéns</h1>

<p>Clique no presente</p>

<div class="caixa" id="caixa" onclick="abrir()">

<div class="tampa"></div>
<div class="base"></div>

</div>

<div id="site" style="display:none">

<h2>Seu presente ❤️</h2>

<p>Aqui você pode colocar o conteúdo do seu site</p>

</div>

</div>

<script>

let perguntas=[
{p:"Há quantos dias estamos juntos?",r:"313"},
{p:"Onde foi nossa primeira foto juntos?",r:"sapuca"}
]

let atual=0
let tentativas=0

function iniciar(){

document.getElementById("inicio").style.display="none"
document.getElementById("quiz").style.display="block"

mostrar()

coracoes()

}

function mostrar(){

document.getElementById("pergunta").innerText=perguntas[atual].p

}

function verificar(){

let r=document.getElementById("resposta").value.toLowerCase()

tentativas++

document.getElementById("tentativas").innerText="Tentativas: "+tentativas

if(r.includes(perguntas[atual].r)){

atual++

if(atual<perguntas.length){

mostrar()

}else{

document.getElementById("quiz").style.display="none"
document.getElementById("presente").style.display="block"

}

}else{

alert("Resposta errada")

}

}

function abrir(){

document.getElementById("caixa").classList.add("aberta")

setTimeout(()=>{
document.getElementById("site").style.display="block"
},1000)

}

function coracoes(){

setInterval(()=>{

let c=document.createElement("div")

c.className="coracao"
c.innerHTML="❤️"

c.style.left=Math.random()*100+"vw"

document.body.appendChild(c)

setTimeout(()=>{c.remove()},6000)

},300)

}

</script>

</body>
</html>
